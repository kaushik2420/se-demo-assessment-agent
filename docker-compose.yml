# Local smoke-test stack. Run before deploying:
#   docker compose up --build
#   open http://localhost:3000
#
# Default ANTHROPIC_API_KEY=empty → the LLM client falls back to mock scores,
# so the portal works end-to-end without an API key. Set ANTHROPIC_API_KEY in
# .env to get real Claude scoring.

version: "3.9"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: se_coach
      POSTGRES_PASSWORD: dev
      POSTGRES_DB: se_coach
    ports:
      - "5432:5432"
    volumes:
      - se_coach_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U se_coach"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: .
      dockerfile: web/backend/Dockerfile
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://se_coach:dev@db:5432/se_coach
      JWT_SECRET: dev-only-not-for-prod-replace-me-with-real-secret
      CORS_ORIGINS: http://localhost:3000
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      CLAUDE_MODEL: claude-sonnet-4-6
      PORT: "8000"
    ports:
      - "8000:8000"

  web:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./web/frontend:/app
    command: sh -c "npm install && npm run dev"
    environment:
      NEXT_PUBLIC_API_BASE: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  se_coach_db:
